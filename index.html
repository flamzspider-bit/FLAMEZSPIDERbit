<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAMEZSPIDER | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0e0e10; color: #ececec; }
        .glass { background: rgba(23, 23, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .message-gradient { background: linear-gradient(135deg, #2b2d31 0%, #1e1f22 100%); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 glass h-full hidden md:flex flex-col p-4 z-20">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center">
                <i data-lucide="zap" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="font-semibold text-lg tracking-tight">FLAMEZSPIDER</h1>
        </div>
        
        <button class="flex items-center gap-3 w-full p-3 rounded-xl bg-white/5 hover:bg-white/10 transition-all text-sm mb-4">
            <i data-lucide="plus" class="w-4 h-4"></i> New Chat
        </button>

        <div class="flex-1 overflow-y-auto custom-scrollbar space-y-2">
            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold px-2 mb-2">Recent</p>
            <div class="text-sm p-2 text-gray-400 hover:text-white cursor-pointer truncate px-2">System Architecture Docs</div>
            <div class="text-sm p-2 text-gray-400 hover:text-white cursor-pointer truncate px-2">Frontend Optimization</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-16 flex items-center justify-between px-6 border-b border-white/5">
            <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-gray-400">Model:</span>
                <span class="text-sm font-semibold flex items-center gap-1">Spider-V1 <i data-lucide="chevron-down" class="w-4 h-4"></i></span>
            </div>
            <div class="flex gap-4">
                <i data-lucide="share-2" class="w-5 h-5 text-gray-400 cursor-pointer hover:text-white"></i>
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-orange-500 to-red-600"></div>
            </div>
        </header>

        <div id="chat-feed" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 custom-scrollbar">
            <div class="max-w-3xl mx-auto text-center mt-20">
                <h2 class="text-4xl font-light mb-4">How can <span class="text-orange-500 font-medium">FlamezSpider</span> help?</h2>
            </div>
        </div>

        <footer class="p-4 md:p-8">
            <div class="max-w-3xl mx-auto relative">
                <div class="glass rounded-2xl p-2 flex flex-col shadow-2xl">
                    <textarea 
                        id="user-input"
                        rows="1"
                        placeholder="Message FlamezSpider..." 
                        class="w-full bg-transparent p-4 outline-none resize-none text-md"
                    ></textarea>
                    <div class="flex justify-between items-center p-2">
                        <div class="flex gap-2">
                            <button class="p-2 hover:bg-white/5 rounded-lg text-gray-400"><i data-lucide="image" class="w-5 h-5"></i></button>
                            <button class="p-2 hover:bg-white/5 rounded-lg text-gray-400"><i data-lucide="mic" class="w-5 h-5"></i></button>
                        </div>
                        <button id="send-btn" class="bg-white text-black px-4 py-2 rounded-xl font-medium hover:bg-gray-200 transition-colors flex items-center gap-2">
                            Send <i data-lucide="arrow-up" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center mt-4 text-gray-600">FlamezSpider may provide inaccurate info. Verify its outputs.</p>
            </div>
        </footer>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const chatFeed = document.getElementById('chat-feed');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function appendMessage(role, content) {
            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            msgDiv.innerHTML = `
                <div class="max-w-[85%] md:max-w-2xl p-4 rounded-2xl ${isUser ? 'bg-orange-600 text-white' : 'message-gradient border border-white/5 text-gray-200'}">
                    <div class="text-xs font-bold mb-1 uppercase tracking-tighter opacity-50">${role}</div>
                    <div class="text-md leading-relaxed">${content}</div>
                </div>
            `;
            
            chatFeed.appendChild(msgDiv);
            chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });
        }

        async function handleChat() {
            const query = userInput.value.trim();
            if (!query) return;

            // Clear input
            appendMessage('user', query);
            userInput.value = '';
            userInput.style.height = 'auto';

            // Simulate AI Thinking
            setTimeout(() => {
                appendMessage('FlamezSpider', "This is a professional response from the FlamezSpider interface. As a Senior Engineer, I've ensured this UI is optimized for 60fps interaction and clean data flow.");
            }, 800);
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChat();
            }
        });
    </script>
</body>
</html>
